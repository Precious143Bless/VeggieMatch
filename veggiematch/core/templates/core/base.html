{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>VeggieMatch</title>
  <link rel="icon" type="image/png" href="{% static 'core/images/logo.png' %}"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static 'core/css/style.css' %}"/>
  <style>
    body { background: #f0f4f0; }
    .vm-main {
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
      background: #fff;
      min-height: 100vh;
      box-shadow: 0 0 40px rgba(0,0,0,0.10);
    }
    .vm-bottom-nav {
      width: 480px;
      left: 50%;
      right: auto;
      transform: translateX(-50%);
    }
  </style>
</head>
<body>

{% if messages %}
<div class="vm-messages">
  {% for msg in messages %}
  <div class="vm-toast vm-toast-{{ msg.tags|default:'info' }}">
    <span>{{ msg }}</span>
    <button onclick="this.parentElement.remove()"><i class="bi bi-x"></i></button>
  </div>
  {% endfor %}
</div>
{% endif %}

<main class="vm-main">
  {% block content %}{% endblock %}
</main>

<nav class="vm-bottom-nav">
  <a href="{% url 'home' %}" class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}">
    <i class="bi bi-house-fill"></i>
    <span>Home</span>
  </a>
  <a href="{% url 'posted_veggies' %}" class="{% if 'posted' in request.resolver_match.url_name %}active{% endif %}">
    <i class="bi bi-basket2-fill"></i>
    <span>Vegetables</span>
  </a>
  <a href="{% url 'rescue_list' %}" class="{% if 'rescue' in request.resolver_match.url_name %}active{% endif %}">
    <i class="bi bi-heart-fill"></i>
    <span>Donate</span>
  </a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'core/js/timer.js' %}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
